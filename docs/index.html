<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>0코스트 AI 음악 기획팀</title>
  <base href="/ai-music-producer/" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <div id="root" class="max-w-3xl mx-auto px-4 py-10"></div>
  <script>
    const steps = [
      { name: 'AI 프로듀서', description: '멜로디·코드 진행 컨셉을 잡습니다.' },
      { name: 'AI 작사가', description: '컨셉에 맞는 가사를 다듬습니다.' },
      { name: 'AI 작곡/MR 감독', description: 'Suno/Udio용 프롬프트와 MR을 준비합니다.' },
      { name: '보컬 녹음 및 보정', description: '스마트폰·BandLab으로 보컬을 올립니다.' },
      { name: '비주얼 및 앨범 아트', description: '무료 AI로 커버·숏츠를 만듭니다.' },
      { name: '유통 및 홍보', description: 'RouteNote/Amuse + 숏폼으로 배포합니다.' }
    ];
    let current = 0;
    const root = document.getElementById('root');
    function render() {
      document.title = '0코스트 AI 음악 기획팀 - ' + steps[current].name;
      root.innerHTML = `
        <h1 class="text-3xl font-bold mb-2">0코스트 AI 음악 기획팀</h1>
        <p class="text-slate-400 mb-6">GitHub Pages에서 바로 사용하는 데모 · 현재 단계: <strong class="text-sky-300">${steps[current].name}</strong></p>
        <div class="flex gap-3 mb-6">
          <button id="prev" class="px-4 py-2 rounded-lg bg-sky-600 hover:bg-sky-500 disabled:opacity-40" ${current===0?'disabled':''}>← 이전</button>
          <button id="next" class="px-4 py-2 rounded-lg bg-sky-600 hover:bg-sky-500 disabled:opacity-40" ${current===steps.length-1?'disabled':''}>다음 →</button>
        </div>
        <div class="space-y-2 rounded-xl border border-slate-800 bg-slate-900/70 p-4">
          ${steps.map((s,i)=>`<div class="rounded-lg px-3 py-2 ${i===current?'bg-sky-950 ring-1 ring-sky-500':''}"><div class="font-semibold">${i+1}. ${s.name}</div><div class="text-sm text-slate-400">${s.description}</div></div>`).join('')}
        </div>
        <p class="mt-8 text-xs text-slate-500">Powered by Zerro · <a class="underline" href="https://github.com/Benjamin5607/ai-music-producer">repo</a></p>
      `;
      document.getElementById('prev').onclick = () => { if (current>0){ current--; render(); } };
      document.getElementById('next').onclick = () => { if (current<steps.length-1){ current++; render(); } };
    }
    render();
  </script>
</body>
</html>
