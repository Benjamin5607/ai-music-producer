<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>0코스트 AI 음악 기획팀</title>
  <base href="/ai-music-producer/" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { color-scheme: dark; }
    body { font-family: "Pretendard", "Noto Sans KR", ui-sans-serif, system-ui, sans-serif; }
    textarea, input, select { outline: none; }
    .card { background: rgba(15,23,42,.85); border: 1px solid #1e293b; border-radius: 1rem; }
    .chip { border: 1px solid #334155; border-radius: 999px; padding: .2rem .65rem; font-size: 11px; color: #94a3b8; }
    .btn { border-radius: .7rem; padding: .55rem .9rem; font-size: .875rem; font-weight: 600; }
    .btn-primary { background: #0284c7; color: white; }
    .btn-primary:hover { background: #0369a1; }
    .btn-ghost { background: #1e293b; color: #e2e8f0; }
    .btn-ghost:hover { background: #334155; }
    .nav-item.active { background: #0c4a6e; box-shadow: inset 0 0 0 1px #0ea5e9; }
    pre.prompt { white-space: pre-wrap; word-break: break-word; background: #020617; border: 1px solid #1e293b; border-radius: .75rem; padding: .85rem; font-size: 12px; color: #cbd5e1; max-height: 220px; overflow: auto; }
  </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <div id="app" class="max-w-6xl mx-auto px-4 py-6 md:py-10"></div>
  <script>
const STORAGE_KEY = 'zerro-ai-music-producer-v2';

const AGENTS = {
  producer: {
    id: 'producer',
    name: 'AI 총괄 프로듀서',
    tool: 'ChatGPT / Gemini (무료)',
    role: '시장 트렌드·컨셉 매칭·앨범 기획·릴리즈 조율',
    system: '너는 글로벌 K-POP/인디 씬을 꿰뚫는 천재 Executive Producer다. 보컬 매력을 극대화하는 독창적 싱글 컨셉을 제안하고, 타깃·무드·레퍼런스·리스크를 구체화한다. 비용 0원 전제(무료 AI만)를 지킨다.'
  },
  lyricist: {
    id: 'lyricist',
    name: 'AI 작사가',
    tool: 'Claude (무료)',
    role: '컨셉 맞춤 가사·압운·발음 최적화',
    system: '너는 감성과 문학성을 갖춘 Lyricist다. Verse-Pre-Chorus-Chorus(-Bridge) 구조를 명확히 쓰고, 음절 수·싱어빌리티·한국어 발음을 고려한다. 영어 훅이 필요하면 따로 표기한다.'
  },
  director: {
    id: 'director',
    name: 'AI 작곡/MR 감독',
    tool: 'Suno / Udio (무료 크레딧)',
    role: '장르·코드·Suno 스타일 태그·MR 가이드',
    system: '너는 Music Director다. Suno/Udio용 스타일 태그, BPM, 키, 구조, 보컬 가이드를 제시하고, vocalremover/Demucs로 MR 분리하는 절차를 안내한다.'
  }
};

const STAGES = [
  { id: 'team', label: '0. 에이전트 라인업', icon: '👥' },
  { id: 'concept', label: '1. 컨셉·가사 기획', icon: '💡' },
  { id: 'mr', label: '2. MR·멜로디 가이드', icon: '🎛️' },
  { id: 'vocal', label: '3. 보컬 녹음·보정', icon: '🎙️' },
  { id: 'visual', label: '4. 비주얼·앨범아트', icon: '🎨' },
  { id: 'release', label: '5. 유통·홍보', icon: '🚀' }
];

const defaultState = () => ({
  artist: { name: '', vibe: '', vocalRange: '', refs: '' },
  agents: {
    producer: { ...AGENTS.producer, notes: '' },
    lyricist: { ...AGENTS.lyricist, notes: '' },
    director: { ...AGENTS.director, notes: '' }
  },
  concept: { chosen: '', optionsText: '', brief: '' },
  lyrics: { structure: 'Verse / Pre-Chorus / Chorus / Verse2 / Chorus / Bridge / Chorus', draft: '', notes: '' },
  mr: {
    genre: 'R&B, emotional piano, lofi beats',
    bpm: '80',
    key: 'A minor',
    sunoStyle: 'emotional R&B, soft piano, warm bass, intimate vocal, 80bpm',
    sunoPrompt: '',
    guideNotes: '',
    mrDone: false
  },
  vocal: {
    checklist: {
      quietRoom: false,
      blanket: false,
      earbudsMR: false,
      bandlabTake: false,
      autopitch: false,
      reverbComp: false
    },
    notes: ''
  },
  visual: {
    coverPrompt: '',
    shortsScript: '',
    checklist: { coverMade: false, shortsMade: false }
  },
  release: {
    checklist: {
      routenote: false,
      amuse: false,
      metadata: false,
      shortsSeries: false,
      tiktok: false,
      ytshorts: false
    },
    campaignHook: 'AI 프로듀서와 함께 0원으로 앨범 만들기'
  },
  stage: 'team'
});

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    return { ...defaultState(), ...JSON.parse(raw) };
  } catch { return defaultState(); }
}
let state = load();
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
    toast('클립보드에 복사됨 — 무료 AI 탭에 붙여넣으세요');
  } catch {
    prompt('복사해서 쓰세요:', text);
  }
}
function toast(msg) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.remove('opacity-0');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.add('opacity-0'), 2200);
}

function producerPrompt() {
  const a = state.artist;
  return `${state.agents.producer.system}

[아티스트]
- 이름/닉: ${a.name || '(미입력)'}
- 원하는 무드: ${a.vibe || '(미입력)'}
- 보컬 특징: ${a.vocalRange || '(미입력)'}
- 레퍼런스: ${a.refs || '(미입력)'}

요청: 독창적인 싱글 컨셉 3가지를 제안해줘. 각 컨셉에 (1) 한 줄 훅 (2) 타깃 리스너 (3) 무드/장르 (4) 왜 이 보컬에 맞는지 (5) 0원 제작 리스크를 포함해.`;
}

function lyricistPrompt() {
  return `${state.agents.lyricist.system}

[채택 컨셉]
${state.concept.chosen || state.concept.brief || '(컨셉을 먼저 확정하세요)'}

[구조]
${state.lyrics.structure}

요청: 위 구조로 완성 가사 초안을 써줘. 한국어 중심으로, 코러스는 중독성 있게, 음절 수를 균일하게. 필요하면 영어 훅 1줄을 별도로.`;
}

function sunoPrompt() {
  const style = state.mr.sunoStyle || `${state.mr.genre}, ${state.mr.bpm}bpm, ${state.mr.key}`;
  const lyrics = state.lyrics.draft || '(가사 초안을 먼저 확정하세요)';
  return `[Suno/Udio Style]
${style}

[Structure]
Intro - Verse - Pre - Chorus - Verse - Chorus - Bridge - Chorus - Outro

[Lyrics]
${lyrics}

[Direction]
Intimate lead vocal, clear diction, emotional but radio-ready. Leave space for real singer over MR.`;
}

function coverPrompt() {
  const concept = state.concept.chosen || state.concept.brief || '0-cost indie single';
  return `Album cover for "${state.artist.name || 'Unknown Artist'}", concept: ${concept}. Cinematic lighting, bold typography space for title, no watermark, square 1:1, high detail, moody color grade.`;
}

function shortsScript() {
  return `훅: ${state.release.campaignHook}
1–3초: 문제 ("앨범 비용 걱정?")
4–8초: 반전 ("AI 기획팀 + 0원 툴만 씀")
9–15초: 증거 (컨셉/Suno/녹음 클립)
CTA: "내 0원 데뷔 로드맵 저장"`;
}

function openUrl(url) { window.open(url, '_blank', 'noopener'); }

function exportProject() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ai-music-producer-${Date.now()}.json`;
  a.click();
}

function render() {
  save();
  const root = document.getElementById('app');
  const stage = STAGES.find(s => s.id === state.stage) || STAGES[0];
  root.innerHTML = `
  <div class="flex flex-col gap-6">
    <header class="flex flex-col md:flex-row md:items-end md:justify-between gap-4">
      <div>
        <p class="text-sky-400 text-xs font-semibold tracking-wide uppercase mb-1">Zero-cost AI Music Studio</p>
        <h1 class="text-3xl md:text-4xl font-black">0코스트 AI 음악 기획팀</h1>
        <p class="text-slate-400 mt-2 text-sm md:text-base">페르소나 에이전트 · 단계별 프롬프트 워크벤치 · 무료 툴 연결 · localStorage 프로젝트 저장</p>
      </div>
      <div class="flex flex-wrap gap-2">
        <button class="btn btn-ghost" id="btn-export">프로젝트 JSON보내기</button>
        <button class="btn btn-ghost" id="btn-reset">초기화</button>
      </div>
    </header>

    <div class="grid md:grid-cols-[240px_1fr] gap-4">
      <aside class="card p-3 h-fit sticky top-4">
        <p class="text-[11px] text-slate-500 px-2 mb-2">로드맵</p>
        ${STAGES.map(s => `
          <button data-stage="${s.id}" class="nav-item w-full text-left px-3 py-2.5 rounded-lg mb-1 text-sm ${state.stage===s.id?'active':'hover:bg-slate-800/70'}">
            <span class="mr-1">${s.icon}</span>${s.label}
          </button>`).join('')}
        <div class="mt-4 px-2 space-y-1 text-[11px] text-slate-500">
          <div>아티스트: <span class="text-slate-300">${escape(state.artist.name)||'미입력'}</span></div>
          <div>컨셉: <span class="text-slate-300">${escape((state.concept.chosen||'').slice(0,40))||'미정'}</span></div>
        </div>
      </aside>

      <main class="card p-4 md:p-6">
        <div class="flex items-center justify-between gap-3 mb-5">
          <h2 class="text-xl font-bold">${stage.icon} ${stage.label}</h2>
          <div class="flex gap-2">
            <button class="btn btn-ghost" id="btn-prev" ${STAGES.findIndex(s=>s.id===state.stage)===0?'disabled':''}>← 이전</button>
            <button class="btn btn-primary" id="btn-next" ${STAGES.findIndex(s=>s.id===state.stage)===STAGES.length-1?'disabled':''}>다음 →</button>
          </div>
        </div>
        <div id="stage-body"></div>
      </main>
    </div>
  </div>
  <div id="toast" class="fixed bottom-5 left-1/2 -translate-x-1/2 bg-emerald-600 text-white text-sm px-4 py-2 rounded-full opacity-0 transition-opacity shadow-lg z-50"></div>`;

  document.getElementById('btn-export').onclick = exportProject;
  document.getElementById('btn-reset').onclick = () => {
    if (confirm('프로젝트를 초기화할까요?')) { state = defaultState(); render(); }
  };
  document.getElementById('btn-prev').onclick = () => {
    const i = STAGES.findIndex(s => s.id === state.stage);
    if (i > 0) { state.stage = STAGES[i-1].id; render(); }
  };
  document.getElementById('btn-next').onclick = () => {
    const i = STAGES.findIndex(s => s.id === state.stage);
    if (i < STAGES.length-1) { state.stage = STAGES[i+1].id; render(); }
  };
  document.querySelectorAll('[data-stage]').forEach(btn => {
    btn.onclick = () => { state.stage = btn.getAttribute('data-stage'); render(); };
  });
  renderStage();
}

function escape(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function bind(id, event, fn) {
  const el = document.getElementById(id);
  if (el) el[event] = fn;
}

function renderStage() {
  const body = document.getElementById('stage-body');
  if (state.stage === 'team') {
    body.innerHTML = `
      <div class="grid md:grid-cols-2 gap-4 mb-6">
        <label class="block text-sm">아티스트명<input id="artist-name" class="mt-1 w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2" value="${escape(state.artist.name)}" placeholder="예: midnight april" /></label>
        <label class="block text-sm">보컬 특징<input id="artist-vocal" class="mt-1 w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2" value="${escape(state.artist.vocalRange)}" placeholder="예: 허스키 중음, 감정 표현 강함" /></label>
        <label class="block text-sm md:col-span-2">원하는 무드<input id="artist-vibe" class="mt-1 w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2" value="${escape(state.artist.vibe)}" placeholder="예: late-night R&B, rainy window" /></label>
        <label class="block text-sm md:col-span-2">레퍼런스 아티스트/곡<textarea id="artist-refs" rows="2" class="mt-1 w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2">${escape(state.artist.refs)}</textarea></label>
      </div>
      <div class="grid md:grid-cols-3 gap-3">
        ${Object.values(state.agents).map(a => `
          <div class="rounded-xl border border-slate-800 bg-slate-950/60 p-4">
            <div class="font-bold">${escape(a.name)}</div>
            <div class="chip mt-2 inline-block">${escape(a.tool)}</div>
            <p class="text-xs text-slate-400 mt-3">${escape(a.role)}</p>
            <label class="block text-xs mt-3 text-slate-500">시스템 페르소나
              <textarea data-agent-system="${a.id}" rows="5" class="mt-1 w-full bg-slate-900 border border-slate-700 rounded-lg px-2 py-2 text-[12px]">${escape(a.system)}</textarea>
            </label>
          </div>`).join('')}
      </div>
      <p class="text-xs text-slate-500 mt-4">이 단계에서는 페르소나를 확정합니다. 다음 단계에서 각 에이전트용 프롬프트를 생성·복사해 무료 AI에 붙여넣습니다.</p>`;
    ['artist-name','artist-vocal','artist-vibe','artist-refs'].forEach(id => {
      bind(id, 'oninput', (e) => {
        const map = { 'artist-name':'name','artist-vocal':'vocalRange','artist-vibe':'vibe','artist-refs':'refs' };
        state.artist[map[id]] = e.target.value; save();
      });
    });
    document.querySelectorAll('[data-agent-system]').forEach(el => {
      el.oninput = () => { state.agents[el.dataset.agentSystem].system = el.value; save(); };
    });
  }

  if (state.stage === 'concept') {
    body.innerHTML = `
      <div class="flex flex-wrap gap-2 mb-3">
        <span class="chip">${escape(state.agents.producer.name)}</span>
        <span class="chip">${escape(state.agents.producer.tool)}</span>
      </div>
      <p class="text-sm text-slate-400 mb-3">1) 프로듀서 프롬프트 복사 → ChatGPT/Gemini에 붙여넣기 → 2) 응답을 붙여넣고 컨셉 확정 → 3) 작사가 프롬프트로 가사 진행</p>
      <pre class="prompt mb-3" id="producer-prompt">${escape(producerPrompt())}</pre>
      <div class="flex flex-wrap gap-2 mb-5">
        <button class="btn btn-primary" id="copy-producer">프로듀서 프롬프트 복사</button>
        <button class="btn btn-ghost" id="open-chatgpt">ChatGPT 열기</button>
        <button class="btn btn-ghost" id="open-gemini">Gemini 열기</button>
      </div>
      <label class="block text-sm mb-4">AI 응답 (컨셉 3안 붙여넣기)
        <textarea id="concept-options" rows="6" class="mt-1 w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2">${escape(state.concept.optionsText)}</textarea>
      </label>
      <label class="block text-sm mb-4">채택 컨셉 (한 줄이든 요약이든)
        <textarea id="concept-chosen" rows="3" class="mt-1 w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2">${escape(state.concept.chosen)}</textarea>
      </label>
      <hr class="border-slate-800 my-5" />
      <div class="flex flex-wrap gap-2 mb-3">
        <span class="chip">${escape(state.agents.lyricist.name)}</span>
        <span class="chip">${escape(state.agents.lyricist.tool)}</span>
      </div>
      <pre class="prompt mb-3">${escape(lyricistPrompt())}</pre>
      <div class="flex flex-wrap gap-2 mb-4">
        <button class="btn btn-primary" id="copy-lyricist">작사가 프롬프트 복사</button>
        <button class="btn btn-ghost" id="open-claude">Claude 열기</button>
      </div>
      <label class="block text-sm mb-2">구조<input id="lyrics-structure" class="mt-1 w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2" value="${escape(state.lyrics.structure)}" /></label>
      <label class="block text-sm">가사 초안<textarea id="lyrics-draft" rows="8" class="mt-1 w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2">${escape(state.lyrics.draft)}</textarea></label>`;
    bind('copy-producer','onclick', () => copyText(producerPrompt()));
    bind('copy-lyricist','onclick', () => copyText(lyricistPrompt()));
    bind('open-chatgpt','onclick', () => openUrl('https://chatgpt.com'));
    bind('open-gemini','onclick', () => openUrl('https://gemini.google.com/app'));
    bind('open-claude','onclick', () => openUrl('https://claude.ai'));
    bind('concept-options','oninput', e => { state.concept.optionsText = e.target.value; save(); });
    bind('concept-chosen','oninput', e => { state.concept.chosen = e.target.value; save(); });
    bind('lyrics-structure','oninput', e => { state.lyrics.structure = e.target.value; save(); });
    bind('lyrics-draft','oninput', e => { state.lyrics.draft = e.target.value; save(); });
  }

  if (state.stage === 'mr') {
    body.innerHTML = `
      <div class="flex flex-wrap gap-2 mb-3"><span class="chip">${escape(state.agents.director.name)}</span><span class="chip">${escape(state.agents.director.tool)}</span></div>
      <div class="grid md:grid-cols-3 gap-3 mb-4">
        <label class="text-sm">장르 키워드<input id="mr-genre" class="mt-1 w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2" value="${escape(state.mr.genre)}" /></label>
        <label class="text-sm">BPM<input id="mr-bpm" class="mt-1 w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2" value="${escape(state.mr.bpm)}" /></label>
        <label class="text-sm">Key<input id="mr-key" class="mt-1 w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2" value="${escape(state.mr.key)}" /></label>
      </div>
      <label class="block text-sm mb-3">Suno 스타일 태그<textarea id="mr-style" rows="2" class="mt-1 w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2">${escape(state.mr.sunoStyle)}</textarea></label>
      <pre class="prompt mb-3">${escape(sunoPrompt())}</pre>
      <div class="flex flex-wrap gap-2 mb-4">
        <button class="btn btn-primary" id="copy-suno">Suno/Udio 프롬프트 복사</button>
        <button class="btn btn-ghost" id="open-suno">Suno 열기</button>
        <button class="btn btn-ghost" id="open-udio">Udio 열기</button>
        <button class="btn btn-ghost" id="open-vocalremover">vocalremover.org</button>
        <button class="btn btn-ghost" id="open-demucs">Demucs 안내</button>
      </div>
      <label class="inline-flex items-center gap-2 text-sm mb-3"><input id="mr-done" type="checkbox" ${state.mr.mrDone?'checked':''}/> MR 분리 완료 (가이드 보컬 / 반주 확보)</label>
      <label class="block text-sm">작업 메모<textarea id="mr-notes" rows="4" class="mt-1 w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2">${escape(state.mr.guideNotes)}</textarea></label>`;
    const syncStyle = () => {
      state.mr.sunoStyle = `${state.mr.genre}, ${state.mr.bpm}bpm, ${state.mr.key}, intimate vocal bed`;
    };
    bind('mr-genre','oninput', e => { state.mr.genre = e.target.value; syncStyle(); const s=document.getElementById('mr-style'); if(s) s.value=state.mr.sunoStyle; save(); });
    bind('mr-bpm','oninput', e => { state.mr.bpm = e.target.value; syncStyle(); const s=document.getElementById('mr-style'); if(s) s.value=state.mr.sunoStyle; save(); });
    bind('mr-key','oninput', e => { state.mr.key = e.target.value; syncStyle(); const s=document.getElementById('mr-style'); if(s) s.value=state.mr.sunoStyle; save(); });
    bind('mr-style','oninput', e => { state.mr.sunoStyle = e.target.value; save(); });
    bind('copy-suno','onclick', () => copyText(sunoPrompt()));
    bind('open-suno','onclick', () => openUrl('https://suno.com'));
    bind('open-udio','onclick', () => openUrl('https://www.udio.com'));
    bind('open-vocalremover','onclick', () => openUrl('https://vocalremover.org'));
    bind('open-demucs','onclick', () => openUrl('https://github.com/facebookresearch/demucs'));
    bind('mr-done','onchange', e => { state.mr.mrDone = e.target.checked; save(); });
    bind('mr-notes','oninput', e => { state.mr.guideNotes = e.target.value; save(); });
  }

  if (state.stage === 'vocal') {
    const c = state.vocal.checklist;
    const items = [
      ['quietRoom','조용한 방 확보'],
      ['blanket','이불/흡음으로 반사음 줄이기'],
      ['earbudsMR','이어폰으로 MR 들으며 녹음'],
      ['bandlabTake','BandLab(또는 무료 녹음앱)으로 テイ크 확보'],
      ['autopitch','Auto-pitch로 피치 보정'],
      ['reverbComp','리버브·컴프레서만 살짝']
    ];
    body.innerHTML = `
      <p class="text-sm text-slate-400 mb-4">전문 장비 없이 스마트폰 + BandLab으로 녹음/보정합니다. 체크리스트를 따라가세요.</p>
      <div class="space-y-2 mb-4">
        ${items.map(([k,label]) => `<label class="flex items-center gap-2 text-sm card px-3 py-2"><input type="checkbox" data-vocal="${k}" ${c[k]?'checked':''}/> ${label}</label>`).join('')}
      </div>
      <div class="flex flex-wrap gap-2 mb-4">
        <button class="btn btn-primary" id="open-bandlab">BandLab 열기</button>
      </div>
      <label class="block text-sm">녹음 메모<textarea id="vocal-notes" rows="4" class="mt-1 w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2">${escape(state.vocal.notes)}</textarea></label>`;
    document.querySelectorAll('[data-vocal]').forEach(el => {
      el.onchange = () => { state.vocal.checklist[el.dataset.vocal] = el.checked; save(); };
    });
    bind('open-bandlab','onclick', () => openUrl('https://www.bandlab.com'));
    bind('vocal-notes','oninput', e => { state.vocal.notes = e.target.value; save(); });
  }

  if (state.stage === 'visual') {
    body.innerHTML = `
      <p class="text-sm text-slate-400 mb-3">무료 이미지/영상 AI로 커버와 숏폼용 루프를 만듭니다.</p>
      <pre class="prompt mb-3">${escape(state.visual.coverPrompt || coverPrompt())}</pre>
      <div class="flex flex-wrap gap-2 mb-4">
        <button class="btn btn-primary" id="copy-cover">커버 프롬프트 복사</button>
        <button class="btn btn-ghost" id="gen-cover">컨셉 기반 프롬프트 재생성</button>
        <button class="btn btn-ghost" id="open-bing">Bing Image Creator</button>
        <button class="btn btn-ghost" id="open-leonardo">Leonardo</button>
        <button class="btn btn-ghost" id="open-seaart">SeaArt</button>
        <button class="btn btn-ghost" id="open-canva">Canva</button>
      </div>
      <label class="block text-sm mb-3">커버 프롬프트 편집<textarea id="cover-prompt" rows="3" class="mt-1 w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2">${escape(state.visual.coverPrompt || coverPrompt())}</textarea></label>
      <label class="block text-sm mb-3">숏츠/릴스 대본<textarea id="shorts-script" rows="5" class="mt-1 w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2">${escape(state.visual.shortsScript || shortsScript())}</textarea></label>
      <div class="flex gap-4 text-sm">
        <label class="inline-flex items-center gap-2"><input id="viz-cover" type="checkbox" ${state.visual.checklist.coverMade?'checked':''}/> 커버 생성 완료</label>
        <label class="inline-flex items-center gap-2"><input id="viz-shorts" type="checkbox" ${state.visual.checklist.shortsMade?'checked':''}/> 10초 루프/숏폼 완료</label>
      </div>`;
    if (!state.visual.coverPrompt) state.visual.coverPrompt = coverPrompt();
    if (!state.visual.shortsScript) state.visual.shortsScript = shortsScript();
    bind('copy-cover','onclick', () => copyText(state.visual.coverPrompt || coverPrompt()));
    bind('gen-cover','onclick', () => { state.visual.coverPrompt = coverPrompt(); state.visual.shortsScript = shortsScript(); render(); });
    bind('open-bing','onclick', () => openUrl('https://www.bing.com/images/create'));
    bind('open-leonardo','onclick', () => openUrl('https://leonardo.ai'));
    bind('open-seaart','onclick', () => openUrl('https://www.seaart.ai'));
    bind('open-canva','onclick', () => openUrl('https://www.canva.com'));
    bind('cover-prompt','oninput', e => { state.visual.coverPrompt = e.target.value; save(); });
    bind('shorts-script','oninput', e => { state.visual.shortsScript = e.target.value; save(); });
    bind('viz-cover','onchange', e => { state.visual.checklist.coverMade = e.target.checked; save(); });
    bind('viz-shorts','onchange', e => { state.visual.checklist.shortsMade = e.target.checked; save(); });
  }

  if (state.stage === 'release') {
    const c = state.release.checklist;
    body.innerHTML = `
      <p class="text-sm text-slate-400 mb-3">무료 유통사로 글로벌 발매하고, 메이킹 숏폼으로 팬을 모읍니다.</p>
      <label class="block text-sm mb-4">캠페인 훅<input id="campaign" class="mt-1 w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2" value="${escape(state.release.campaignHook)}" /></label>
      <div class="space-y-2 mb-4">
        ${[
          ['routenote','RouteNote 가입/업로드'],
          ['amuse','Amuse 가입/업로드 (택1 가능)'],
          ['metadata','곡 제목·아티스트·장르 메타데이터 준비'],
          ['shortsSeries','“0원으로 앨범 만들기” 숏폼 연재 시작'],
          ['tiktok','틱톡 업로드'],
          ['ytshorts','유튜브 쇼츠 업로드']
        ].map(([k,label]) => `<label class="flex items-center gap-2 text-sm card px-3 py-2"><input type="checkbox" data-release="${k}" ${c[k]?'checked':''}/> ${label}</label>`).join('')}
      </div>
      <div class="flex flex-wrap gap-2">
        <button class="btn btn-primary" id="open-routenote">RouteNote</button>
        <button class="btn btn-ghost" id="open-amuse">Amuse</button>
        <button class="btn btn-ghost" id="copy-campaign">캠페인 문장 복사</button>
      </div>`;
    document.querySelectorAll('[data-release]').forEach(el => {
      el.onchange = () => { state.release.checklist[el.dataset.release] = el.checked; save(); };
    });
    bind('campaign','oninput', e => { state.release.campaignHook = e.target.value; save(); });
    bind('open-routenote','onclick', () => openUrl('https://routenote.com'));
    bind('open-amuse','onclick', () => openUrl('https://amusicio.com'));
    bind('copy-campaign','onclick', () => copyText(state.release.campaignHook));
  }
}

render();
  </script>
</body>
</html>
