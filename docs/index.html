<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>0창치 AI 방개권 공구과</title><base href="/ai-music-producer/" /><script src="https://cdn.tailwindcss.com"></script><style>:root { color-scheme: dark; }body { font-family: "Pretendard", "Noto Sans KR", ui-sans-serif, system-ui, sans-serif; }textarea, input, select { outline: none; }.card { background: rgba(15,23,42,.85); border: 1px solid #1e293b; border-radius: 1rem; }.chip { border: 1px solid #334155; border-radius: 999px; padding: 0.25rem 0.5rem; background: #1f2c40; color: #fff; }</style></head><body><header class="p-3 bg-[#1a202c] text-white"><h1 class="text-lg font-bold mb-2">0창치 AI 방개권 공구과</h1><p class="text-sm mb-4">0찼치 AI 방개권 공구과 다구 로그게 및 신 리 어 디 로그게</p><div class="flex flex-wrap gap-2"><button class="btn btn-ghost" id="btn-export">JSON 로그게 불기</button><button class="btn btn-ghost" id="btn-reset">JSON 총가</button></div></header><!-- 다구 로그게 및 신 리 어 디 로그게 --><div class="grid md:grid-cols-[240px_1fr] gap-4"><main class="card p-3 h-fit"><h2 class="text-lg font-bold mb-2">0창치 AI 방개권 공구과</h2><p class="text-sm mb-4">AI 방개권 공구과 다구 로그게 및 신 리 어 디 로그게</p><div class="flex flex-wrap gap-2"><button class="btn btn-ghost" id="btn-export">JSON 로그게 불기</button><button class="btn btn-ghost" id="btn-reset">JSON 총가</button></div></main></div><script>const STAGES = [{id: 1, icon: '🏄', label: '작군 방개 공구과'}, {id: 2, icon: '🎵', label: 'MR(방개) 방개 그램 작군 리 어 디 로그게'}]; let state = {stage: 1, artist: {name: ''}, concept: {chosen: ''}}; try { // 다구 로그게 및 신 리 어 디 로그게 const storedState = localStorage.getItem('state'); if (storedState) { state = JSON.parse(storedState); } } catch (error) { console.error('Error loading state:', error); } function saveState() { try { localStorage.setItem('state', JSON.stringify(state)); } catch (error) { console.error('Error saving state:', error); } } document.getElementById('btn-export').addEventListener('click', () => { try { const jsonData = JSON.stringify(state, null, 2); const blob = new Blob([jsonData], {type: 'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'state.json'; a.click(); } catch (error) { console.error('Error exporting state:', error); } }); document.getElementById('btn-reset').addEventListener('click', () => { try { state = {stage: 1, artist: {name: ''}, concept: {chosen: ''}}; saveState(); } catch (error) { console.error('Error resetting state:', error); } });</script></body></html>
